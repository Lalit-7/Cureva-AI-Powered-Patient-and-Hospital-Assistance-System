<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Dashboard | Cureva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>

<div class="dashboard-layout">

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar" id="sidebar">
    <a href="/" class="sidebar-logo">Cureva</a>

    <nav class="sidebar-menu">
      <a class="active" href="/patient">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/patient/history">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </a>
      <a href="/patient/messages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
      </a>
      <a href="/patient/hospitals">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Hospitals
      </a>
      <a href="/patient/profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="avatar">👤</div>
      <div>
        <strong>John Patient</strong>
        <p>john@email.com</p>
      </div>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <main class="main-content">

    <header class="page-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="sidebar-toggle-btn" id="sidebarToggle" title="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
        <h1 id="pageTitle">AI Medical Assistant</h1>
        <p id="pageSubtitle">Describe symptoms or upload medical images for AI analysis</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="newChatBtn" class="btn-secondary" title="Start a new consultation" onclick="createNewConversation()">
          ＋ New Chat
        </button>
        <button id="deleteConversationBtn" class="btn-delete" style="display: none;" title="Delete this conversation">
          🗑️ Delete Chat
        </button>
        <button id="logoutBtn" class="btn-secondary" title="Sign out" style="gap: 8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </button>
      </div>
    </header>

    <!-- CHAT CARD -->
    <div class="content-grid">
      <div class="card">
        <div class="ai-workspace">

          <!-- ================= CHAT ================= -->
          <div class="chat-area" id="chatOutput">
            <div class="empty-chat">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-light)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 16px;">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              <h3>Start Medical Analysis</h3>
              <p>Upload reports or describe symptoms to receive AI-powered insights.</p>
            </div>
          </div>

          <!-- ================= INPUT ================= -->
          <div class="chat-input-bar">

            <input type="file" id="imageInput" hidden>

            <button id="uploadBtn" title="Upload Medical Image">
              📎
            </button>

            <button id="recordBtn" title="Voice Input">
              🎤
            </button>

            <input
              type="text"
              id="textInput"
              placeholder="Describe your symptoms or medical concern..."
            >

            <button id="analyzeBtn">
              Analyze →
            </button>

          </div>

          <p id="voiceStatus" class="muted" style="padding: 0 24px 12px; font-size: 12px;"></p>

        </div>
      </div>
    </div>

  </main>

</div>

<script src="{{ url_for('static', filename='js/analyze.js') }}"></script>
<script>
  // Sidebar toggle
  document.getElementById('sidebarToggle')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('active');
  });
  document.getElementById('sidebarOverlay')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
  });

  // Logout handler
  document.getElementById('logoutBtn')?.addEventListener('click', async () => {
    try {
      const res = await fetch('/api/auth/logout', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        window.location.href = data.redirect || '/';
      }
    } catch (err) {
      window.location.href = '/logout';
    }
  });
</script>

</body>
</html>
